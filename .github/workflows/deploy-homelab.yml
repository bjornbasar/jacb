name: Deploy to Homelab

on:
  workflow_dispatch:
  push:
    branches: [master]

env:
  REGISTRY: 192.168.4.9:5000
  IMAGE: jacb
  TAG: dev
  NALLE: ubuntu@192.168.4.9
  LARS: ubuntu@192.168.4.37
  NALLE_DIR: /data/personal/jacb
  LARS_DIR: /data/ui/jacb

jobs:
  build-and-deploy:
    runs-on: [self-hosted, homelab]

    steps:
      - name: Build on Nalle
        run: |
          ssh $NALLE "cd $NALLE_DIR && git pull --ff-only && docker build -t $REGISTRY/$IMAGE:$TAG -f Dockerfile ."

      - name: Push to local registry
        run: |
          ssh $NALLE "docker push $REGISTRY/$IMAGE:$TAG"

      - name: Deploy on Lars
        run: |
          ssh $LARS "cd $LARS_DIR && docker compose pull && docker compose up -d"

      - name: Notify Slack
        if: always()
        run: |
          STATUS=${{ job.status }}
          ICON=$([ "$STATUS" = "success" ] && echo ":white_check_mark:" || echo ":x:")
          echo "{\"text\":\"${ICON} *jacb* deploy ${STATUS} (Lars)\"}" > /tmp/slack-msg.json
          curl -s -X POST -H 'Content-type: application/json' -d @/tmp/slack-msg.json "$(cat ~/.slack-webhook)"
          rm -f /tmp/slack-msg.json
